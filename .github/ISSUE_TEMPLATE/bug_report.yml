name: Bug report
description: Report a reproducible bug in kyma-ter
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: kyma-ter version
      placeholder: "0.1.7"
    validations:
      required: true
  - type: input
    id: agent_version
    attributes:
      label: @kyma-api/agent version
      placeholder: "0.1.8"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open kyma-ter
        2. Create a second workspace
        3. Switch back
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots if available.
